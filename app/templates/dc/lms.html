<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Registration</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <img src="../static/css/images/chips_logo.jpg" alt="CHiPS Logo">
        </div>
        <h1>LMS Registration Portal</h1>
    </header>

    <div class="container">
        <h2>Register User</h2>

        <form hx-post="/lms/request" hx-target="#lms-request-table-body" hx-swap="beforeend">

            <div class="row">
                <div class="input-group">
                    <label>First Name <span class="required">*</span></label>
                    <input type="text" name="first_name" required>
                </div>

                <div class="input-group">
                    <label>Middle Name</label>
                    <input type="text" name="middle_name">
                </div>

                <div class="input-group">
                    <label>Last Name <span class="required">*</span></label>
                    <input type="text" name="last_name" required>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <input type="tel" name="phone" required>
                </div>

                <div class="input-group">
                    <label>Email ID <span class="required">*</span></label>
                    <input type="email" name="email" required>
                </div>
            </div>

           <div class="row">
                <div class="input-group">
                    <label>District <span class="required">*</span></label>
                    <select name="district" required>
                        <option value="">Select District</option>
                        <option value="Balod">Balod</option>
                        <option value="Baloda Bazar">Baloda Bazar</option>
                        <option value="Balrampur">Balrampur</option>
                        <option value="Bastar">Bastar</option>
                        <option value="Bemetara">Bemetara</option>
                        <option value="Bijapur">Bijapur</option>
                        <option value="Bilaspur">Bilaspur</option>
                        <option value="Dantewada">Dantewada</option>
                        <option value="Dhamtari">Dhamtari</option>
                        <option value="Durg">Durg</option>
                        <option value="Gariaband">Gariaband</option>
                        <option value="Gaurela-Pendra-Marwahi">Gaurela-Pendra-Marwahi</option>
                        <option value="Janjgir-Champa">Janjgir-Champa</option>
                        <option value="Jashpur">Jashpur</option>
                        <option value="Kabirdham">Kabirdham</option>
                        <option value="Kanker">Kanker</option>
                        <option value="Khairagarh-Chhuikhadan-Gandai">Khairagarh-Chhuikhadan-Gandai</option>
                        <option value="Kondagaon">Kondagaon</option>
                        <option value="Korba">Korba</option>
                        <option value="Koriya">Koriya</option>
                        <option value="Mahasamund">Mahasamund</option>
                        <option value="Manendragarh-Chirmiri-Bharatpur">Manendragarh-Chirmiri-Bharatpur</option>
                        <option value="Mohla-Manpur-Ambagarh Chowki">Mohla-Manpur-Ambagarh Chowki</option>
                        <option value="Mungeli">Mungeli</option>
                        <option value="Narayanpur">Narayanpur</option>
                        <option value="Raigarh">Raigarh</option>
                        <option value="Raipur">Raipur</option>
                        <option value="Rajnandgaon">Rajnandgaon</option>
                        <option value="Sakti">Sakti</option>
                        <option value="Sarangarh-Bilaigarh">Sarangarh-Bilaigarh</option>
                        <option value="Sukma">Sukma</option>
                        <option value="Surajpur">Surajpur</option>
                        <option value="Surguja">Surguja</option>
                    </select>
                </div>
            </div>

            <div class="button-container">
                <button type="submit" class="btn">
                    Register
                </button>
            </div>

        </form>
    </div>

    <div class="container data-grid-container" style="margin-top: 2rem;">
        <h2>Request Queue</h2>
        <table>
            <thead>
                <tr>
                    <th>Operator Name</th>
                    <th>Email Address</th>
                    <th>Lifecycle Status</th>
                </tr>
            </thead>
            <tbody id="lms-request-table-body">
                </tbody>
        </table>
    </div>

</body>
</html>
