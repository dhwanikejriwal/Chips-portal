<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L1/L2 Verification Dashboard</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/approvals.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo-section">
            <button id="sidebar-toggle" class="sidebar-toggle-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <img src="/static/css/images/chips_logo.jpg" alt="CHiPS Logo">
            <h1>CHiPS Admin Portal</h1>
        </div>
        <div class="user-profile-box">
            <div class="user-info">
                <span class="user-name">{{ session.get('username', 'chips_admin') }}</span>
                <span class="user-role">CHIPS Administrator</span>
            </div>
            <a href="/auth/logout" class="logout-link">Logout</a>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Sidebar -->
        {% include "partials/sidebar.html" %}

        <!-- Content -->
        <main class="content">
            <h2>L1/L2 Verification Dashboard</h2>
            <div class="table-container">
                <p style="color: #666; font-size: 14px;">Placeholder for Developer 3's L1 Verification and L2 Sign-off Approval dashboard queues.</p>
            </div>
        </main>
    </div>

    <script>
        // Sidebar Toggle Collapse/Expand persistence
        const sidebar = document.querySelector('.sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        
        if (localStorage.getItem('sidebar-collapsed') === 'true') {
            sidebar.classList.add('collapsed');
        }
        
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
        });
    </script>
</body>
</html>
