<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L1/L2 Verification Dashboard</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/chips/approvals.css">
</head>
<body>
    <!-- Header -->
    {% include "partials/header.html" %}

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Sidebar -->
        {% include "partials/sidebar.html" %}

        <!-- Content -->
        <main class="content">
            <h2>L1/L2 Verification Dashboard</h2>
            <div class="table-container">
                <p style="color: #666; font-size: 14px;">Placeholder for Developer 3's L1 Verification and L2 Sign-off Approval dashboard queues.</p>
            </div>
        </main>
    </div>

    <script>
        // Sidebar Toggle Collapse/Expand persistence
        const sidebar = document.querySelector('.sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        
        if (localStorage.getItem('sidebar-collapsed') === 'true') {
            sidebar.classList.add('collapsed');
        }
        
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
        });
    </script>
</body>
</html>
