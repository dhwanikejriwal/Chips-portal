{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-screen">
    <div class="bg-[#1a1a1e] border border-[#2d2d34] rounded-xl p-8 w-[360px] shadow-2xl">
        <div class="text-center mb-6">
            <div class="w-12 h-12 rounded-lg bg-blue-600/20 flex items-center justify-center mx-auto mb-3">
                <i class="ti ti-id text-2xl text-blue-400"></i>
            </div>
            <h2 class="text-xl font-medium text-white">Operator Process Portal</h2>
            <p class="text-xs text-gray-400 mt-1">LMS & Operational Lifecycles</p>
        </div>

        <form hx-post="/auth/login" hx-target="#main-content" class="space-y-4">
            <div>
                <label class="block text-xs text-gray-400 mb-1">Username</label>
                <input type="text" name="username" class="w-full bg-[#121214] border border-[#2d2d34] rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500" required>
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">Password</label>
                <input type="password" name="password" class="w-full bg-[#121214] border border-[#2d2d34] rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium text-sm py-2 px-4 rounded-lg transition-colors mt-2">
                Sign In to Dashboard
            </button>
        </form>
    </div>
</div>
{% endblock %}
