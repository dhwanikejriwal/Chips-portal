<style>
    /* Responsive header variables and base overrides */
    :root {
        --header-height: 80px;
    }

    .header {
        height: var(--header-height) !important;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px !important;
        background: #ffffff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        position: relative;
        z-index: 1000;
        transition: all 0.3s ease;
    }

    .logo-section {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .logo-section img {
        height: 50px;
        width: auto;
        transition: height 0.3s ease;
    }

    .logo-section h1 {
        font-size: 26px;
        font-weight: 700;
        color: #1a202c;
        margin: 0;
        white-space: nowrap;
        letter-spacing: -0.5px;
        transition: font-size 0.3s ease;
    }

    .user-profile-box {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 12px;
        background: #f8fafc;
        padding: 6px 14px;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        transition: all 0.3s ease;
    }

    .profile-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #10b981 0%, #047857 100%); /* Premium green matching CHiPS branding */
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 15px;
        box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
        border: 2px solid #ffffff;
        flex-shrink: 0;
        text-transform: uppercase;
        transition: all 0.3s ease;
    }

    .user-info {
        display: flex;
        flex-direction: column;
        text-align: right;
        white-space: nowrap;
        justify-content: center;
    }

    .user-name {
        font-size: 13px;
        font-weight: 600;
        color: #1e293b;
        transition: font-size 0.3s ease;
    }

    .user-role {
        font-size: 10px;
        color: #64748b;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.5px;
        transition: font-size 0.3s ease;
    }

    .logout-link {
        color: #ef4444;
        text-decoration: none;
        font-size: 12px;
        font-weight: 600;
        padding-left: 12px;
        border-left: 1px solid #cbd5e1;
        transition: all 0.2s ease;
    }

    .logout-link:hover {
        color: #dc2626;
    }

    /* Force main layout height adjustment relative to header height */
    .main-layout {
        height: calc(100vh - var(--header-height)) !important;
    }

    /* --- RESPONSIVE BREAKPOINTS --- */

    /* Small desktops / Large tablets (up to 1100px) */
    @media (max-width: 1100px) {
        :root {
            --header-height: 75px;
        }
        .logo-section h1 {
            font-size: 22px;
        }
        .logo-section img {
            height: 44px;
        }
    }

    /* Medium/Small tablets (up to 992px) */
    @media (max-width: 992px) {
        :root {
            --header-height: 70px;
        }
        .header {
            padding: 0 20px !important;
        }
        .logo-section h1 {
            font-size: 18px;
        }
        .logo-section img {
            height: 38px;
        }
        .logo-section {
            gap: 12px;
        }
        .user-profile-box {
            padding: 5px 10px;
            gap: 10px;
        }
        .profile-avatar {
            width: 32px;
            height: 32px;
            font-size: 13px;
        }
    }

    /* Small tablets / Mobile landscape (up to 768px) */
    @media (max-width: 768px) {
        :root {
            --header-height: 65px;
        }
        .logo-section h1 {
            font-size: 16px;
        }
        .logo-section img {
            height: 34px;
        }
        .user-name {
            font-size: 12px;
        }
        .user-role {
            font-size: 9px;
        }
        .logout-link {
            font-size: 11px;
            padding-left: 8px;
        }
    }

    /* Sidebar goes inline below 700px in layout.css, so main-layout height should be auto */
    @media (max-width: 700px) {
        .main-layout {
            height: auto !important;
        }
    }

    /* Large mobile devices (up to 576px) */
    @media (max-width: 576px) {
        .header {
            padding: 0 12px !important;
        }
        .logo-section h1 {
            font-size: 14px;
        }
        .logo-section img {
            height: 30px;
        }
        .logo-section {
            gap: 8px;
        }
        .user-role {
            display: none !important; /* Hide user role on small screens to save space */
        }
        .user-profile-box {
            padding: 4px 8px;
            gap: 8px;
        }
        .profile-avatar {
            width: 28px;
            height: 28px;
            font-size: 12px;
        }
    }

    /* Small mobile devices / Stacked layout (up to 420px) */
    @media (max-width: 420px) {
        :root {
            --header-height: auto;
        }
        .header {
            flex-direction: column;
            padding: 10px 12px !important;
            gap: 10px !important;
            align-items: stretch;
        }
        .logo-section {
            width: 100%;
            justify-content: flex-start;
        }
        .logo-section h1 {
            font-size: 15px;
            white-space: normal; /* Allow title text to wrap cleanly */
        }
        .user-profile-box {
            width: 100%;
            margin-left: 0;
            justify-content: space-between;
        }
        .user-info {
            text-align: left;
        }
    }
</style>

<header class="header">
    <div class="logo-section">
        <button id="sidebar-toggle" class="sidebar-toggle-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <img src="/static/css/images/chips_logo.jpg" alt="CHiPS Logo">
        <h1>Request Acceptance Portal</h1>
    </div>

    <div class="user-profile-box">
        <div class="profile-avatar">
            {{ (session.get('username') or 'U')[0] | upper }}
        </div>
        <div class="user-info">
            <span class="user-name">{{ session.get('username', '') }}</span>
            {% if session.get('role') == 'chips_admin' %}
            <span class="user-role">CHIPS Administrator</span>
            {% else %}
            <span class="user-role">District Coordinator ({{ session.get('district_name', '') }})</span>
            {% endif %}
        </div>
        <a href="/auth/logout" class="logout-link">Logout</a>
    </div>
</header>
