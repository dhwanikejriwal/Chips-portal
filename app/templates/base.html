<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aadhaar Operator Process Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root {
            --color-bg-main: #121214;
            --color-card: #1a1a1e;
            --color-border: #2d2d34;
        }
        body { background-color: var(--color-bg-main); color: #e2e8f0; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="min-h-screen">
    
    <main id="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Global handler to parse JWT authorization headers from backend responses if needed
        document.body.addEventListener('htmx:configRequest', (event) => {
            const token = localStorage.getItem('token');
            if (token) {
                event.detail.headers['Authorization'] = `Bearer ${token}`;
            }
        });
    </script>
</body>
</html>
